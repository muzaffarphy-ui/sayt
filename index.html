<style>
:root{
  --ink:#16191d; --ink-soft:#4a5058; --line:#e3e6ea;
  --accent:#1c3d66; --accent-soft:#eef2f7; --bg:#ffffff;
  --max:940px; --nav-bg:rgba(255,255,255,.82);
}
html[data-theme="dark"]{
  --ink:#e8ebef; --ink-soft:#a2abb6; --line:#2a2f36;
  --accent:#8fb6e3; --accent-soft:#1b2129; --bg:#121417;
  --nav-bg:rgba(18,20,23,.82);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased}
.wrap{max-width:var(--max);margin:0 auto;padding:0 24px}
a{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent}
a:hover{border-bottom-color:var(--accent)}
h1,h2,h3{font-family:Georgia,"Times New Roman",Times,serif;font-weight:600;letter-spacing:-.01em;margin:0}
h1{font-size:38px;line-height:1.2}
h2{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);font-weight:600;margin:0 0 22px}
h3{font-size:17px;margin:0 0 6px}
p{margin:0 0 16px}

/* A11y: klaviatura fokusi aniq ko'rinsin (B6) */
a:focus-visible,button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
/* A11y: skip-link — faqat fokusda ko'rinadi */
.skip{position:absolute;left:-9999px;top:0;z-index:100;background:var(--accent);color:var(--bg);
  padding:8px 14px;font-size:13.5px;border-bottom:none}
.skip:focus{left:0}

nav{position:sticky;top:0;z-index:50;background:var(--nav-bg);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav-in{max-width:var(--max);margin:0 auto;padding:0 24px;display:flex;align-items:center;
  justify-content:space-between;min-height:52px;gap:16px}
.nav-name{font-family:Georgia,"Times New Roman",Times,serif;font-weight:600;font-size:15px;color:var(--ink);white-space:nowrap}
.nav-name:hover{border-bottom-color:transparent}
.nav-links{display:flex;flex-wrap:wrap;gap:18px;align-items:center}
.nav-links a{font-size:13.5px;color:var(--ink-soft);border-bottom:1px solid transparent}
.nav-links a:hover{color:var(--accent);border-bottom-color:var(--accent)}
.nav-links a[aria-current="true"]{color:var(--accent);border-bottom-color:var(--accent)}
.nav-tools{display:flex;gap:8px;align-items:center;flex:none}
.tbtn{background:none;border:1px solid var(--line);color:var(--ink-soft);height:30px;padding:0 8px;
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;line-height:1;
  font-size:12px;font-weight:600;letter-spacing:.03em}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.tbtn.icon{width:30px;padding:0}
.tbtn svg{width:15px;height:15px;display:block}
html[data-theme="dark"] .icon-moon{display:none}
html:not([data-theme="dark"]) .icon-sun{display:none}

section{padding:56px 0;border-top:1px solid var(--line)}
#hero{padding:64px 0 56px;border-top:none}
.hero-grid{display:flex;gap:44px;align-items:flex-start;justify-content:space-between}
.hero-main{flex:1;min-width:0}
.hero-title{font-size:15px;color:var(--ink-soft);margin:10px 0 4px}
.hero-role{font-size:15px;color:var(--ink-soft);margin:0 0 22px}
.lede{font-size:17.5px;line-height:1.6;max-width:640px;margin:0 0 24px}
.links{display:flex;flex-wrap:wrap;gap:8px 10px;font-size:13.5px}
.links a{border:1px solid var(--line);padding:4px 10px;color:var(--ink-soft)}
.links a:hover{border-color:var(--accent);color:var(--accent)}
.portrait{width:190px;height:190px;flex:none;border:1px solid var(--line);background:var(--accent-soft);
  display:flex;align-items:center;justify-content:center;text-align:center;padding:12px;
  font-size:12px;color:var(--ink-soft);line-height:1.4;object-fit:cover}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:26px 34px}
.card{border-left:2px solid var(--accent);padding:2px 0 2px 16px}
.card p{margin:0;font-size:14.5px;color:var(--ink-soft);line-height:1.6}

.project{border-left:2px solid var(--accent);padding:2px 0 6px 16px;margin-bottom:26px}
.project:last-child{margin-bottom:0}
.project h3{margin-bottom:4px}
.project .meta{font-size:12.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.project .meta .dot{opacity:.5;margin:0 6px}
.project p{margin:0 0 6px;font-size:14.5px;color:var(--ink-soft);line-height:1.6}
.project .partners{font-size:13px;color:var(--ink-soft)}
.status-pill{display:inline-block;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;
  border:1px solid var(--line);padding:1px 7px;color:var(--accent);background:var(--accent-soft)}

.filters{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 26px}
.filters button{font:inherit;font-size:13px;background:none;border:1px solid var(--line);
  color:var(--ink-soft);padding:5px 12px;cursor:pointer}
.filters button:hover{border-color:var(--accent);color:var(--accent)}
.filters button[aria-pressed="true"]{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600}
ol.pubs{list-style:none;margin:0;padding:0}
ol.pubs li{position:relative;padding:14px 0 14px 34px;border-top:1px solid var(--line);font-size:14.5px;line-height:1.6}
ol.pubs li::before{content:attr(data-n) ".";position:absolute;left:0;top:14px;color:var(--ink-soft);
  font-variant-numeric:tabular-nums;font-size:13px}
ol.pubs li em{color:var(--ink-soft)}
.badge{display:inline-block;margin-left:6px;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;
  font-weight:600;color:var(--accent);background:var(--accent-soft);border:1px solid var(--line);
  padding:1px 6px;vertical-align:1px}
.note{font-size:13.5px;color:var(--ink-soft);margin-top:22px}

.cv-block{margin-bottom:38px}
.cv-block:last-child{margin-bottom:0}
h3.sub{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);font-weight:600;margin:0 0 16px}
.entry{display:flex;gap:24px;padding:14px 0;border-top:1px solid var(--line)}
.entry .when{flex:none;width:170px;font-size:13.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums;padding-top:1px}
.entry .what{flex:1;min-width:0}
.entry .what strong{font-weight:600;display:block}
.entry .where{font-size:14px;color:var(--ink-soft)}
.entry .detail{font-size:14px;color:var(--ink-soft);margin-top:4px}

dl.defs{margin:0}
dl.defs > div{display:flex;gap:24px;padding:12px 0;border-top:1px solid var(--line)}
dl.defs dt{flex:none;width:170px;font-size:13.5px;color:var(--ink-soft);font-weight:600}
dl.defs dd{margin:0;flex:1;min-width:0;font-size:14.5px}

ul.news{list-style:none;margin:0;padding:0}
ul.news li{display:flex;gap:24px;padding:14px 0;border-top:1px solid var(--line);font-size:14.5px;line-height:1.6}
ul.news .when{flex:none;width:110px;color:var(--ink-soft);font-size:13.5px;font-variant-numeric:tabular-nums;padding-top:1px}

footer{border-top:1px solid var(--line);padding:26px 0 40px;font-size:13px;color:var(--ink-soft);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
#loadmsg{padding:60px 0;color:var(--ink-soft);font-size:14px}

/* ============================================================
   MOTION — faqat prefers-reduced-motion: no-preference da (B3, 3.1)
   Faqat transform/opacity; tashqi kutubxona yo'q.
   ============================================================ */
@media (prefers-reduced-motion: no-preference){
  html{scroll-behavior:smooth}
  body{transition:background-color .2s linear,color .2s linear}
  a,.tbtn,.filters button,.links a,.nav-links a{transition:color .18s linear,border-color .18s linear,background-color .18s linear}
  main{transition:opacity .12s linear}
  ol.pubs{transition:opacity .12s linear}
  /* scroll-reveal: .reveal klassi faqat JS (IntersectionObserver) mavjud bo'lsa qo'yiladi —
     JS o'chirilganda hech narsa yashirilmaydi (3.1) */
  section.reveal{opacity:0;transform:translateY(12px)}
  section.reveal.in{opacity:1;transform:none;transition:opacity .4s ease-out,transform .4s ease-out}
  .reveal .stag{opacity:0;transform:translateY(10px)}
  .reveal.in .stag{opacity:1;transform:none;transition:opacity .4s ease-out,transform .4s ease-out}
  /* hover mikro-interaksiyalar */
  .card,.project{transition:transform .15s ease-out}
  .card:hover,.project:hover{transform:translateX(2px)}
  /* tema tugmasi ikonasi */
  @keyframes iconPop{from{transform:rotate(-40deg) scale(.6)}to{transform:none}}
  .theme-anim svg{animation:iconPop .2s ease-out}
}

@media (max-width:760px){
  h1{font-size:30px}
  .lede{font-size:16.5px}
  .hero-grid{flex-direction:column-reverse;align-items:flex-start;gap:26px}
  .portrait{width:140px;height:140px;font-size:11px}
  .grid{grid-template-columns:1fr;gap:22px}
  .nav-links{gap:14px}
  .nav-links a{font-size:12.5px}
  section{padding:44px 0}
  #hero{padding:44px 0}
}
@media (max-width:640px){
  .wrap,.nav-in{padding:0 18px}
  .nav-in{flex-wrap:wrap;padding-top:8px;padding-bottom:8px}
  .entry,dl.defs > div,ul.news li{flex-direction:column;gap:4px}
  .entry .when,dl.defs dt,ul.news .when{width:auto}
}
@media print{
  nav,.filters,.nav-tools,.skip{display:none !important}
  body{color:#000;background:#fff;font-size:11pt}
  a{color:#000;border:none}
  a[href^="http"]::after{content:" (" attr(href) ")";font-size:8.5pt;color:#555;word-break:break-all}
  section{padding:18px 0;page-break-inside:avoid;opacity:1 !important;transform:none !important}
  section .stag{opacity:1 !important;transform:none !important}
  ol.pubs li{display:list-item !important}
  .portrait{display:none}
  h2{color:#000}
}

  function setupReveal() {
    if (REDUCE || !('IntersectionObserver' in window)) return; /* reduce/eski brauzer: hech narsa yashirilmaydi */
    var secs = document.querySelectorAll('main section');
    var left = secs.length;
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (en) {
        if (!en.isIntersecting) return;
        en.target.classList.add('in');
        io.unobserve(en.target);
        /* reveal tugagach stagger kechikishlarini tozalash (hover transitionlariga xalaqit bermasin) */
        (function (sec) {
          setTimeout(function () {
            Array.prototype.forEach.call(sec.querySelectorAll('.stag'), function (c) {
              c.classList.remove('stag');
              c.style.transitionDelay = '';
            });
          }, 1000);
        })(en.target);
        left -= 1;
        if (left <= 0) io.disconnect();
      });
    }, { threshold: 0.1 });
    Array.prototype.forEach.call(secs, function (s) {
      Array.prototype.forEach.call(s.querySelectorAll('.card, .project, .entry, ul.news li, ol.pubs li'), function (c, i) {
        c.classList.add('stag');
        c.style.transitionDelay = (Math.min(i, 8) * 60) + 'ms'; /* stagger 8-elementdan keyin to'xtaydi */
      });
      s.classList.add('reveal');
      io.observe(s);
    });
  }

  /* ---------- nav scrollspy (3.2.3) — reduced-motion da ham ishlaydi (holat, harakat emas) ---------- */
  function setupSpy() {
    if (!('IntersectionObserver' in window)) return;
    var map = {};
    Array.prototype.forEach.call(document.querySelectorAll('.nav-links a[data-nav]'), function (a) {
      map[a.getAttribute('data-nav')] = a;
    });
    var spy = new IntersectionObserver(function (entries) {
      entries.forEach(function (en) {
        if (!en.isIntersecting) return;
        Array.prototype.forEach.call(document.querySelectorAll('.nav-links a[aria-current]'), function (a) {
          a.removeAttribute('aria-current');
        });
        if (map[en.target.id]) map[en.target.id].setAttribute('aria-current', 'true');
      });
    }, { rootMargin: '-30% 0px -60% 0px' });
    Array.prototype.forEach.call(document.querySelectorAll('main section[id]'), function (s) { spy.observe(s); });
  }

  function boot(D) {
    el('loadmsg').style.display = 'none';

    var storedLang = stored('lang');
    var lang = (storedLang === 'en' || storedLang === 'uz') ? storedLang : ((D.config && D.config.defaultLang) || 'en');
    var U = UI;
    function T(v) { if (v && typeof v === 'object' && ('en' in v || 'uz' in v)) return v[lang] || v.en || v.uz || ''; return v == null ? '' : v; }

    var pubs = (D.publications || []).slice();
    var orcidAdded = [];
    var current = 'all';

    /* ----- render everything for current language ----- */
    function render() {
      var P = D.profile || {}, L = P.links || {}, cfg = D.config || {};

      // nav + headings
      Array.prototype.forEach.call(document.querySelectorAll('[data-nav]'), function (a) {
        a.textContent = T((U.nav || {})[a.getAttribute('data-nav')]);
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-h]'), function (h) {
        h.textContent = T((U.headings || {})[h.getAttribute('data-h')]);
      });
      Array.prototype.forEach.call(document.querySelectorAll('[data-sub]'), function (h) {
        h.textContent = T((U.cvSub || {})[h.getAttribute('data-sub')]);
      });

      // hero
      el('p-name').textContent = P.name || '';
      el('p-title').textContent = T(P.title);
      el('p-role').textContent = T(P.role);
      el('p-lede').textContent = T(P.lede);
      el('f-name').textContent = P.name || '';
      el('f-loc').textContent = T(P.location);
      document.querySelector('.nav-name').textContent = P.name || '';
      document.documentElement.setAttribute('lang', lang);

      var linkHtml = [];
      if (P.email) linkHtml.push('<a href="mailto:' + esc(P.email) + '">' + esc(T((U.labels||{}).email) || 'Email') + '</a>');
      if (L.orcid) linkHtml.push(ext(L.orcid, 'ORCID'));
      if (L.scholar) linkHtml.push(ext(L.scholar, 'Google Scholar'));
      if (L.researchgate) linkHtml.push(ext(L.researchgate, 'ResearchGate'));
      if (L.linkedin) linkHtml.push(ext(L.linkedin, 'LinkedIn'));
      el('p-links').innerHTML = linkHtml.join('');

      el('p-portrait').innerHTML = P.portrait
        ? '<img class="portrait" src="' + esc(P.portrait) + '" alt="' + esc(P.name) + '" width="190" height="190" loading="lazy" decoding="async">'
        : '<div class="portrait">Portrait — add in CMS<br>(190 &times; 190 px)</div>';

      el('c-about').innerHTML = (D.about || []).map(function (t) { return '<p>' + esc(T(t)) + '</p>'; }).join('');

      function cards(arr) {
        return (arr || []).map(function (c) {
          return '<div class="card"><h3>' + esc(T(c.title)) + '</h3><p>' + esc(T(c.text)) + '</p></div>';
        }).join('');
      }
      el('c-research').innerHTML = cards(D.research);

      // projects
      var lab = U.labels || {};
      el('c-projects').innerHTML = (D.projects || []).map(function (pr) {
        var meta = [];
        if (T(pr.role)) meta.push(esc(T(pr.role)));
        if (T(pr.period)) meta.push(esc(T(pr.period)));
        var metaLine = meta.join('<span class="dot">·</span>');
        var status = T(pr.status) ? '<span class="status-pill">' + esc(T(pr.status)) + '</span>' : '';
        var partners = T(pr.partners) ? '<div class="partners">' + esc(T(lab.partners) || 'Partners') + ': ' + esc(T(pr.partners)) + '</div>' : '';
        var link = pr.link ? ' ' + ext(pr.link, 'Link') : '';
        return '<div class="project"><h3>' + esc(T(pr.title)) + '</h3>' +
          (metaLine || status ? '<div class="meta">' + metaLine + (metaLine && status ? '<span class="dot">·</span>' : '') + status + '</div>' : '') +
          (T(pr.description) ? '<p>' + esc(T(pr.description)) + link + '</p>' : '') +
          partners + '</div>';
      }).join('');

      renderNews();

      // contact
      var crows = [];
      if (P.email) crows.push([esc(T(lab.email) || 'Email'), '<a href="mailto:' + esc(P.email) + '">' + esc(P.email) + '</a>']);
      if (T(P.institution)) crows.push([esc(T(lab.institution) || 'Institution'), esc(T(P.institution))]);
      if (L.orcid) crows.push(['ORCID', ext(L.orcid, cfg.orcid || L.orcid)]);
      if (cfg.researcherId) crows.push([esc(T(lab.researcherId) || 'ResearcherID'), esc(cfg.researcherId) + ' (Web of Science)']);
      var prof = [];
      if (L.researchgate) prof.push(ext(L.researchgate, 'ResearchGate'));
      if (L.scholar) prof.push(ext(L.scholar, 'Google Scholar'));
      if (L.linkedin) prof.push(ext(L.linkedin, 'LinkedIn'));
      if (prof.length) crows.push([esc(T(lab.profiles) || 'Profiles'), prof.join(' &middot; ')]);
      el('c-contact').innerHTML = crows.map(function (r) { return '<div><dt>' + r[0] + '</dt><dd>' + r[1] + '</dd></div>'; }).join('');
      el('c-contact-note').textContent = T(D.contact && D.contact.note);

      el('c-pubnote').innerHTML = esc(T(lab.pubNote))
        .replace('ORCID', L.orcid ? ext(L.orcid, 'ORCID') : 'ORCID')
        .replace('ResearchGate', L.researchgate ? ext(L.researchgate, 'ResearchGate') : 'ResearchGate');

      // pub filter buttons
      Array.prototype.forEach.call(document.querySelectorAll('#pubFilters button'), function (b) {
        b.textContent = T((U.filters || {})[b.getAttribute('data-filter')]);
      });

      renderPubs(current);
    }

    function renderNews() {
      el('c-news').innerHTML = (D.news || []).map(function (n) {
        return '<li><span class="when">' + esc(T(n.when)) + '</span><span>' + esc(T(n.text)) + '</span></li>';
      }).join('');
    }

    function pubHtml(p) {
      var s = esc(p.text);
      if (p.venue) s += ' <em>' + esc(p.venue) + '</em>';
      if (p.year) s += (p.venue ? ', ' : ' ') + esc(p.year);
      s += '.';
      if (p.doi) s += ' ' + ext('https://doi.org/' + String(p.doi).replace(/^https?:\/\/doi\.org\//, ''), 'DOI');
      else if (p.url) s += ' ' + ext(p.url, 'Link');
      if (p.badge) s += '<span class="badge">' + esc(p.badge) + '</span>';
      return s;
    }
    function renderPubs(type) {
      current = type;
      var html = '', n = 0;
      pubs.forEach(function (p) {
        if (type !== 'all' && p.type !== type) return;
        n += 1;
        html += '<li data-n="' + n + '"' + (n === 1 ? ' style="border-top:0"' : '') + '>' + pubHtml(p) + '</li>';
      });
      el('pubList').innerHTML = html;
      Array.prototype.forEach.call(document.querySelectorAll('#pubFilters button'), function (b) {
        b.setAttribute('aria-pressed', b.getAttribute('data-filter') === type ? 'true' : 'false');
      });
    }
    Array.prototype.forEach.call(document.querySelectorAll('#pubFilters button'), function (b) {
      b.addEventListener('click', function () {
        var type = b.getAttribute('data-filter');
        if (REDUCE) { renderPubs(type); return; }
        /* qisqa fade — qayta raqamlash buzilmaydi (3.2.7) */
        var list = el('pubList');
        list.style.opacity = '0';
        setTimeout(function () { renderPubs(type); list.style.opacity = ''; }, 120);
      });
    });

    /* ---------- language toggle (tanlov saqlanadi — 4.1) ---------- */
    var langBtn = el('langBtn');
    function syncLangBtn() {
      langBtn.textContent = lang === 'en' ? 'UZ' : 'EN';
      langBtn.setAttribute('aria-label', lang === 'en' ? "O'zbekchaga o'tish" : 'Switch to English');
    }
    langBtn.addEventListener('click', function () {
      lang = (lang === 'en') ? 'uz' : 'en';
      store('lang', lang);
      syncLangBtn();
      if (REDUCE) { render(); return; }
      /* qisqa crossfade — layout sakramaydi (3.2.6) */
      var main = document.querySelector('main');
      main.style.opacity = '0';
      setTimeout(function () { render(); main.style.opacity = ''; }, 120);
    });

    syncLangBtn();
    render();
    el('yr').textContent = new Date().getFullYear();

    /* motion qatlami — birinchi renderdan keyin (hero shu orqali fade-in bo'ladi) */
    setupReveal();
    setupSpy();

    /* ============================================================
       AUTO-DETECTION — ORCID public API (unchanged behavior)
       ============================================================ */
    var cfg = D.config || {};
    if (cfg.orcidLive && cfg.orcid) {
      var norm = function (s) { return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim(); };
      var haveT = {}, haveD = {};
      pubs.forEach(function (p) { haveT[norm(p.text)] = 1; if (p.doi) haveD[String(p.doi).toLowerCase()] = 1; });
      var TYPE_MAP = { 'JOURNAL_ARTICLE':'article','REVIEW':'article','BOOK_CHAPTER':'article',
        'CONFERENCE_ABSTRACT':'conference','CONFERENCE_PAPER':'conference','CONFERENCE_POSTER':'conference','LECTURE_SPEECH':'conference' };
      /* B4: 7 soniyalik timeout — ORCID javob bermasa so'rov uziladi */
      var ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
      var tId = ctrl ? setTimeout(function () { ctrl.abort(); }, 7000) : null;
      var opts = { headers: { 'Accept': 'application/json' } };
      if (ctrl) opts.signal = ctrl.signal;
      fetch('https://pub.orcid.org/v3.0/' + cfg.orcid + '/works', opts)
        .then(function (r) { if (tId) clearTimeout(tId); return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function (data) {
          var added = [];
          ((data && data.group) || []).forEach(function (g) {
            var w = (g['work-summary'] || [])[0];
            if (!w) return;
            var title = w.title && w.title.title && w.title.title.value;
            if (!title) return;
            var doi = '';
            ((w['external-ids'] && w['external-ids']['external-id']) || []).forEach(function (i) {
              if (String(i['external-id-type']).toLowerCase() === 'doi') doi = i['external-id-value'];
            });
            if (haveT[norm(title)]) return;
            if (doi && haveD[doi.toLowerCase()]) return;
            haveT[norm(title)] = 1; if (doi) haveD[doi.toLowerCase()] = 1;
            added.push({ type: TYPE_MAP[String(w.type || '').toUpperCase()] || 'article', text: title,
              venue: (w['journal-title'] && w['journal-title'].value) || '',
              year: String((w['publication-date'] && w['publication-date'].year && w['publication-date'].year.value) || ''),
              doi: doi, url: (w.url && w.url.value) || '', badge: '', source: 'orcid' });
          });
          if (!added.length) return;
          pubs = added.concat(pubs);
          pubs.sort(function (a, b) { return (parseInt(b.year, 10) || 0) - (parseInt(a.year, 10) || 0); });
          renderPubs(current);
          if (cfg.orcidAutoNews) {
            if (!D.news) D.news = []; /* B1: news bo'lmasa ham qulamaydi */
            added.forEach(function (p) {
              D.news.unshift({ when: { en: p.year || '', uz: p.year || '' },
                text: { en: 'New publication: ' + p.text + (p.venue ? ' (' + p.venue + ')' : ''),
                        uz: 'Yangi nashr: ' + p.text + (p.venue ? ' (' + p.venue + ')' : '') } });
            });
            renderNews();
          }
        })
        .catch(function () { if (tId) clearTimeout(tId); /* silent */ });
    }
  }
})();
</script>
